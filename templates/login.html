<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Faculty Workload System</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-focus: #3b82f6;
        }

        body.login-page {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(45deg, #1e293b, #3b82f6, #0f172a, #1d4ed8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            margin: 0;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating interactive backgrounds */
        .shape {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            animation: float 20s infinite;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: #3b82f6;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: #8b5cf6;
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        .shape-3 {
            width: 250px;
            height: 250px;
            background: #2563eb;
            bottom: 20%;
            left: 20%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            33% { transform: translateY(-30px) scale(1.1); }
            66% { transform: translateY(20px) scale(0.9); }
        }

        /* Marquee Styles */
        .marquee-container {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 0;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .marquee-content {
            display: flex;
            white-space: nowrap;
            animation: marquee 20s linear infinite;
        }

        .marquee-content span {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 0 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .marquee-content:hover {
            animation-play-state: paused;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .login-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0.5rem 0;
        }

        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--input-focus);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Password Toggle Styling */
        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            border: none;
            background: none;
            padding: 0;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 0.875rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading .spinner {
            display: block;
        }

        .loading .btn-text {
            display: none;
        }
    </style>
</head>

<body class="login-page">
    <!-- Interactive Background Shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <!-- Animated Marquee -->
    <div class="marquee-container">
        <div class="marquee-content">
            <!-- Duplicate content for seamless infinite loop -->
            <span><i data-lucide="sparkles" size="16" style="color: #fb923c;"></i> Welcome to FacultyPulse</span>
            <span><i data-lucide="graduation-cap" size="16"></i> Streamlining Academic Excellence</span>
            <span><i data-lucide="bar-chart-2" size="16"></i> Advanced Workload Analytics</span>
            <span><i data-lucide="users" size="16"></i> Faculty Activity Tracking</span>
            
            <span><i data-lucide="sparkles" size="16" style="color: #fb923c;"></i> Welcome to FacultyPulse</span>
            <span><i data-lucide="graduation-cap" size="16"></i> Streamlining Academic Excellence</span>
            <span><i data-lucide="bar-chart-2" size="16"></i> Advanced Workload Analytics</span>
            <span><i data-lucide="users" size="16"></i> Faculty Activity Tracking</span>
        </div>
    </div>

    <!-- Main Card -->
    <div class="login-card">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div class="brand-logo" style="margin: 0 auto 1.25rem;">
                <i data-lucide="book-open"></i>
            </div>
            <h1 class="login-title">FacultyPulse</h1>
            <p style="color: var(--text-muted); font-size: 0.95rem;">University Management Portal</p>
        </div>

        <form id="loginForm" method="POST">
            <!-- Role Selection -->
            <div class="form-group" style="margin-bottom: 2rem;">
                <label class="form-label" style="text-align: center; display: block; margin-bottom: 1rem;">Select Access Role</label>
                <div class="role-selector" style="display: flex; gap: 10px; justify-content: center;">
                    <label class="role-option">
                        <input type="radio" name="role" value="faculty" checked style="display: none;">
                        <div class="role-card">
                            <i data-lucide="user"></i>
                            <span>Faculty</span>
                        </div>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="hod" style="display: none;">
                        <div class="role-card">
                            <i data-lucide="shield-check"></i>
                            <span>HOD</span>
                        </div>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="admin" style="display: none;">
                        <div class="role-card">
                            <i data-lucide="settings"></i>
                            <span>Admin</span>
                        </div>
                    </label>
                </div>
            </div>

            <style>
                .role-selector {
                    margin-bottom: 1.5rem;
                }
                .role-option {
                    flex: 1;
                    cursor: pointer;
                }
                .role-card {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    padding: 0.75rem;
                    border: 2px solid var(--border-color);
                    border-radius: 1rem;
                    transition: all 0.2s ease;
                    text-align: center;
                }
                .role-card i {
                    width: 20px;
                    height: 20px;
                    margin-bottom: 4px;
                    color: var(--text-muted);
                }
                .role-card span {
                    font-size: 0.75rem;
                    font-weight: 700;
                    color: var(--text-muted);
                }
                .role-option input:checked + .role-card {
                    border-color: var(--primary);
                    background: rgba(37, 99, 235, 0.05);
                }
                .role-option input:checked + .role-card i,
                .role-option input:checked + .role-card span {
                    color: var(--primary);
                }
                .role-card:hover {
                    border-color: var(--primary);
                }
            </style>

            <div class="form-group">
                <label class="form-label">Institutional Email</label>
                <input type="email" name="email" class="form-control" placeholder="name@university.edu" required>
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label class="form-label">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="passwordField" name="password" class="form-control"
                        placeholder="••••••••" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i id="eyeIcon" data-lucide="eye" style="width: 18px;"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary" style="width: 100%;">
                <div class="spinner"></div>
                <span class="btn-text">Authenticate Access</span>
            </button>
        </form>

        </div>
    </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // 1. Toggle Password Visibility
        function togglePassword() {
            const passwordField = document.getElementById('passwordField');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordField.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons(); // Refresh icons
        }

        // 2. Interactive Loading State
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.onsubmit = function () {
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            // The form will naturally submit via POST. 
            // The loading state provides visual feedback.
        };
    </script>
</body>

</html>
