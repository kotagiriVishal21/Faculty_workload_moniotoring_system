<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Port - FacultyPulse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-role="faculty">
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand-section">
                <div class="brand-logo">
                    <i data-lucide="graduation-cap"></i>
                </div>
                <span class="brand-name">FacultyPulse</span>
            </div>
            <nav class="nav-menu">
                <a href="{{ url_for('index') }}" class="nav-link">
                    <i data-lucide="layout-dashboard"></i> <span>Dashboard</span>
                </a>
                <a href="{{ url_for('add_teaching') }}" class="nav-link">
                    <i data-lucide="plus-circle"></i> <span>Teaching Log</span>
                </a>
                <a href="{{ url_for('add_activity') }}" class="nav-link">
                    <i data-lucide="clipboard-list"></i> <span>Academic Tasks</span>
                </a>
                <a href="{{ url_for('add_research') }}" class="nav-link active">
                    <i data-lucide="microscope"></i> <span>Research Port</span>
                </a>
                <a href="{{ url_for('logout') }}" class="nav-link logout-link">
                    <i data-lucide="log-out"></i> <span>Sign Out</span>
                </a>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="top-header">
                <div class="header-left">
                    <span class="page-breadcrumb">Faculty / Research Port</span>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <div class="user-avatar">{{ session['name'][0] }}</div>
                        <div class="user-info">
                            <span class="user-name">{{ session['name'] }}</span>
                            <span class="user-role">Faculty Member</span>
                        </div>
                    </div>
                </div>
            </header>

            <main class="content-area">
                <div class="section-header">
                    <h1 class="section-title">Research Contributions</h1>
                    <p style="color: var(--text-muted);">Publish findings, register patents, and record industrial collaborations.</p>
                </div>

                <div class="card" style="max-width: 800px; margin-top: 0;">
                    <form method="POST">
                        <div class="form-group">
                            <label class="form-label">Publication or Project Title</label>
                            <input type="text" name="title" class="form-control" placeholder="e.g. Neural Networks in Adaptive Control" required>
                        </div>
                        <div class="dashboard-grid" style="grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 0;">
                            <div class="form-group">
                                <label class="form-label">Contribution Type</label>
                                <select name="type" class="form-control">
                                    <option>Journal Publication</option>
                                    <option>Patent Filed</option>
                                    <option>FDP Participation</option>
                                    <option>Industry Alliance</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Journal / Organization</label>
                                <input type="text" name="journal" class="form-control" placeholder="e.g. Elsevier, IEEE Xplore">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Achievement Year</label>
                            <input type="text" name="year" class="form-control" placeholder="e.g. 2024" required>
                        </div>
                        <div style="margin-top: 2rem;">
                            <button type="submit" class="btn-primary">Register Research Milestone</button>
                            <a href="{{ url_for('index') }}" style="margin-left: 1rem; color: var(--text-muted); text-decoration: none;">Cancel</a>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
